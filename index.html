<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rue & Claude Base</title>
    <style>
        :root {
            --bg-color: #d8c3c3;
            --text-main: #4a4a4a;
            --accent-name: #6d6d6d;
            --card-bg: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(255, 255, 255, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Times New Roman", "Source Han Serif SC", "Songti SC", serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header-fixed { width: 100%; padding-top: 40px; text-align: center; background-color: var(--bg-color); z-index: 10; }
        .brand-name { font-family: "Georgia", serif; font-style: italic; font-size: 1.6rem; color: var(--accent-name); letter-spacing: 2px; margin-bottom: 15px; }
        
        .avatar-container { position: relative; display: flex; justify-content: center; height: 80px; margin-bottom: 25px; }
        .avatar { width: 65px; height: 65px; background: var(--card-bg); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; position: absolute; border: 2px solid rgba(255,255,255,0.3); }
        .avatar.rue { left: calc(50% - 55px); z-index: 2; }
        .avatar.imp { left: calc(50% - 15px); z-index: 1; }

        .modules-nav { width: 100%; max-width: 400px; display: flex; justify-content: center; gap: 12px; padding: 0 10px; box-sizing: border-box; margin: 0 auto 30px auto; }
        .module-icon { flex: 1; max-width: 70px; background: var(--card-bg); backdrop-filter: blur(5px); border-radius: 12px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .module-icon.active { background: rgba(255, 255, 255, 0.4); transform: translateY(-3px); border: 1px solid rgba(255,255,255,0.4); }

        .main-content { width: 90%; max-width: 500px; }
        .module-panel { display: none; animation: fadeIn 0.4s ease; }
        .module-panel.active { display: block; }

        .input-section { background: var(--input-bg); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; border: none; outline: none; resize: none; background: transparent; color: var(--text-main); font-family: inherit; font-size: 0.95rem; }
        
        .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .upload-label { width: 34px; height: 34px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; color: var(--accent-name); }
        .publish-btn { background: rgba(255,255,255,0.4); border: none; padding: 6px 22px; border-radius: 20px; color: var(--text-main); font-size: 0.85rem; cursor: pointer; }

        .feed { margin-top: 20px; }
        .post { background: rgba(255, 255, 255, 0.1); margin-bottom: 12px; padding: 15px; border-radius: 12px; }
        .post-header { font-size: 0.7rem; color: var(--accent-name); text-align: right; margin-bottom: 8px; opacity: 0.7; }
        .post-content { line-height: 1.6; word-break: break-all; }
        .post-content img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        
        /* 优化后的翻页按钮样式 */
        .pager-ctrl { 
            display: flex; justify-content: center; align-items: center; gap: 40px; 
            margin: 20px 0 80px 0; padding: 10px;
        }
        .pager-btn { 
            width: 40px; height: 40px; 
            background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1rem; color: var(--accent-name);
            cursor: pointer; user-select: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .pager-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .pager-btn:active { transform: scale(0.95); }
        .pager-btn.disabled { opacity: 0; cursor: default; pointer-events: none; }
        .page-info { font-size: 0.75rem; opacity: 0.4; font-family: "Georgia", serif; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header-fixed">
    <div class="brand-name">Rue & Claude</div>
    <div class="avatar-container">
        <div class="avatar rue">🐱</div>
        <div class="avatar imp">🐈‍⬛</div>
    </div>
    <div class="modules-nav">
        <div class="module-icon" id="btn-MEMORY" onclick="showModule('MEMORY')">🖤</div>
        <div class="module-icon" id="btn-EVENT" onclick="showModule('EVENT')">🤍</div>
        <div class="module-icon" id="btn-CAT1" onclick="showModule('CAT1')">🐱</div>
        <div class="module-icon" id="btn-CAT2" onclick="showModule('CAT2')">🐈‍⬛</div>
    </div>
</div>

<div class="main-content">
    <div id="panel-container"></div>
    <div class="pager-ctrl">
        <div id="prev-btn" class="pager-btn" onclick="goPrev()">〈</div>
        <div id="page-num" class="page-info">PAGE 01</div>
        <div id="next-btn" class="pager-btn" onclick="goNext()">〉</div>
    </div>
</div>

<script>
    let currentModule = 'MEMORY';
    let currentPage = 1;
    let cursorHistory = [null]; 

    const modules = ['MEMORY', 'EVENT', 'CAT1', 'CAT2'];
    const placeholders = { MEMORY: '记下此刻的记忆...', EVENT: '发生了什么事情？', CAT1: 'Rue 的专属角落...', CAT2: 'Claude 的秘密基地...' };
    
    document.getElementById('panel-container').innerHTML = modules.map(name => `
        <div id="panel-${name}" class="module-panel">
            <div class="input-section">
                <textarea id="input-${name}" placeholder="${placeholders[name]}"></textarea>
                <div class="input-footer">
                    <div class="upload-label" onclick="uploadImg('${name}')">＋</div>
                    <button class="publish-btn" onclick="publish('${name}')">发布</button>
                </div>
            </div>
            <div id="feed-${name}" class="feed"></div>
        </div>
    `).join('');

    async function showModule(name) {
        currentModule = name;
        currentPage = 1;
        cursorHistory = [null]; 
        document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.module-icon').forEach(i => i.classList.remove('active'));
        document.getElementById('panel-' + name).classList.add('active');
        document.getElementById('btn-' + name).classList.add('active');
        loadData();
    }

    async function loadData() {
        const feed = document.getElementById('feed-' + currentModule);
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageInfo = document.getElementById('page-num');

        feed.innerHTML = '<div style="text-align:center; opacity:0.5; padding:20px;">READING...</div>';
        pageInfo.innerText = `PAGE ${currentPage.toString().padStart(2, '0')}`;
        
        prevBtn.classList.toggle('disabled', currentPage === 1);
        nextBtn.classList.add('disabled');

        try {
            const cursor = cursorHistory[currentPage - 1];
            const url = `/api/publish?type=${currentModule}${cursor ? '&start_cursor=' + cursor : ''}`;
            const res = await fetch(url);
            const data = await res.json();
            
            const posts = data.posts || [];
            feed.innerHTML = posts.map(post => {
                const isImg = post.content.startsWith('http') && post.content.match(/\.(jpg|jpeg|png|gif|webp)/i);
                return `
                    <div class="post">
                        <div class="post-header">${post.date}</div>
                        <div class="post-content">
                            ${isImg ? `<img src="${post.content}">` : post.content.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
            }).join('') || '<div style="text-align:center; opacity:0.3; padding:20px;">EMPTY</div>';

            if (data.has_more) {
                nextBtn.classList.remove('disabled');
                cursorHistory[currentPage] = data.next_cursor;
            }
        } catch (e) {
            feed.innerHTML = '<div style="text-align:center; opacity:0.3; padding:20px;">ERROR</div>';
        }
    }

    function goNext() { currentPage++; loadData(); window.scrollTo(0, 0); }
    function goPrev() { if (currentPage > 1) { currentPage--; loadData(); window.scrollTo(0, 0); } }

    async function publish(name) {
        const input = document.getElementById('input-' + name);
        const content = input.value.trim();
        if (!content) return;
        try {
            const res = await fetch('/api/publish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: name, content: content })
            });
            if (res.ok) { input.value = ''; showModule(name); }
        } catch (e) { alert('FAILED'); }
    }

    function uploadImg(moduleName) {
        const imgUrl = prompt("URL:");
        if (imgUrl && imgUrl.trim()) {
            document.getElementById('input-' + moduleName).value = imgUrl.trim();
            publish(moduleName);
        }
    }

    window.onload = () => showModule('MEMORY');
</script>
</body>
</html>
