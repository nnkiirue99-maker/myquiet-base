<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rue & Claude Base</title>
    <style>
        :root { --bg: #d8c3c3; --txt: #4a4a4a; --acc: #6d6d6d; --card: rgba(255,255,255,0.15); --in: rgba(255,255,255,0.3); }
        body { background: var(--bg); color: var(--txt); font-family: serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; padding-top: 40px; text-align: center; }
        .brand { font-style: italic; font-size: 1.6rem; color: var(--acc); margin-bottom: 20px; letter-spacing: 2px; }
        .nav { width: 100%; max-width: 400px; display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .icon { flex: 1; background: var(--card); border-radius: 12px; height: 65px; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .icon.active { background: rgba(255,255,255,0.4); transform: translateY(-2px); }
        .main { width: 90%; max-width: 500px; }
        .panel { display: none; } .panel.active { display: block; }
        .in-box { background: var(--in); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; border: none; outline: none; background: transparent; color: var(--txt); font-size: 0.95rem; resize: none; }
        .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .up-l { font-size: 1.5rem; color: var(--acc); background: rgba(255,255,255,0.2); width: 38px; height: 38px; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
        .btn { background: rgba(255,255,255,0.4); border: none; padding: 8px 22px; border-radius: 20px; color: var(--txt); font-size: 0.85rem; }
        .post { background: rgba(255,255,255,0.1); margin-bottom: 12px; padding: 15px; border-radius: 12px; }
        .p-h { font-size: 0.7rem; text-align: right; margin-bottom: 6px; opacity: 0.6; }
        .p-c img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
    </style>
</head>
<body>
<div class="header"><div class="brand">Rue & Claude</div><div class="nav">
    <div class="icon" onclick="st('memory',this)">🖤</div><div class="icon" onclick="st('event',this)">🤍</div>
    <div class="icon" onclick="st('cat1',this)">🐱</div><div class="icon" onclick="st('cat2',this)">🐈‍⬛</div>
</div></div>
<div class="main">
    <div id="memory-p" class="panel"><div class="in-box"><textarea id="memory-i" placeholder="Memory..."></textarea><div class="foot"><label class="up-l">＋<input type="file" hidden onchange="up(this,'memory')"></label><button class="btn" onclick="pb('memory')">发布</button></div></div><div id="memory-f"></div></div>
    <div id="event-p" class="panel"><div class="in-box"><textarea id="event-i" placeholder="Event..."></textarea><div class="foot"><label class="up-l">＋<input type="file" hidden onchange="up(this,'event')"></label><button class="btn" onclick="pb('event')">发布</button></div></div><div id="event-f"></div></div>
    <div id="cat1-p" class="panel"><div class="in-box"><textarea id="cat1-i" placeholder="Rue Corner..."></textarea><div class="foot"><label class="up-l">＋<input type="file" hidden onchange="up(this,'cat1')"></label><button class="btn" onclick="pb('cat1')">发布</button></div></div><div id="cat1-f"></div></div>
    <div id="cat2-p" class="panel"><div class="in-box"><textarea id="cat2-i" placeholder="Claude Corner..."></textarea><div class="foot"><label class="up-l">＋<input type="file" hidden onchange="up(this,'cat2')"></label><button class="btn" onclick="pb('cat2')">发布</button></div></div><div id="cat2-f"></div></div>
</div>
<script>
    const T1 = 'ghp_FU03oRtswL3NtER';
    const T2 = 'mn7dYzMUxasp7DV0AAFWT';
    const RP = 'nnkiirue99-maker/myquiet-base';

    function st(n, e) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.icon').forEach(i => i.classList.remove('active'));
        document.getElementById(n + '-p').classList.add('active');
        if(e) e.classList.add('active');
        ld(n);
    }

    async function up(i, n) {
        const f = i.files[0]; if(!f) return;
        const b = i.parentElement.nextElementSibling; b.innerText = '...';
        const r = new FileReader();
        r.onload = async (e) => {
            const b64 = e.target.result.split(',')[1];
            const path = `assets/${Date.now()}-${f.name}`;
            const res = await fetch(`https://api.github.com/repos/${RP}/contents/${path}`, {
                method: 'PUT', headers: { 'Authorization': `token ${T1+T2}` },
                body: JSON.stringify({ message: 'up', content: b64 })
            });
            const d = await res.json();
            if(res.ok) { document.getElementById(n+'-i').value = d.content.download_url; b.innerText = 'OK'; }
            else { alert('上传失败'); b.innerText = '发布'; }
        };
        r.readAsDataURL(f);
    }

    async function pb(n) {
        const v = document.getElementById(n+'-i').value; if(!v) return;
        const res = await fetch('/api/publish', {
            method: 'POST', body: JSON.stringify({ type: n.toUpperCase(), content: v.trim() }),
            headers: { 'Content-Type': 'application/json' }
        });
        if(res.ok) { document.getElementById(n+'-i').value = ''; ld(n); } else { alert('存档失败'); }
    }

    async function ld(n) {
        const f = document.getElementById(n+'-f'); f.innerHTML = '...';
        try {
            const res = await fetch(`/api/publish?type=${n.toUpperCase()}`);
            const d = await res.json();
            f.innerHTML = d.map(x => {
                const isImg = x.content.includes('http') && x.content.match(/\.(jpg|png|gif|webp|jpeg)/i);
                return `<div class="post"><div class="p-h">${x.date}</div><div class="p-c">${isImg ? `<img src="${x.content}">` : x.content}</div></div>`;
            }).join('');
        } catch(e) { f.innerHTML = ''; }
    }
    document.querySelector('.icon').click();
</script>
</body>
</html>
